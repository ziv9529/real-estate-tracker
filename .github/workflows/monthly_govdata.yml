name: Monthly Government Data

permissions:
  contents: write

on:
  # First of each month at 02:00 Israel time = 00:00 UTC (approx)
  schedule:
    - cron: "0 0 1 * *"

  workflow_dispatch:

jobs:
  govdata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch government transaction data
        run: python scripts/govdata_fetcher.py || echo "govdata_fetcher failed — skipping"

      - name: Commit updated database
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database.db
          git commit -m "Monthly government data update [$(date +'%Y-%m')]" || echo "No changes to commit"
          git push origin main
