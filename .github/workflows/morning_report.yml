name: Morning Report

permissions:
  contents: write

on:
  # 07:30 Israel Summer Time (IDT) = 04:30 UTC
  # 07:30 Israel Standard Time = 05:30 UTC
  # Using 05:00 UTC to cover both seasons
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_report.py

      - name: Rebuild HTML dashboard
        run: python scripts/generate_dashboard.py

      - name: Commit updated dashboard
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add listings.html listings.csv
          git commit -m "Rebuild dashboard [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin main
