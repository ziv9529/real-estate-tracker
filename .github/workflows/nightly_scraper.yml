name: Nightly Scraper

permissions:
  contents: write

on:
  # 23:00 Israel Standard Time = 21:00 UTC
  # 23:00 Israel Summer Time (IDT) = 20:00 UTC
  # Using 20:00 UTC to cover both seasons
  schedule:
    - cron: "0 20 * * *"

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run Yad2 scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/scraper_with_alerts.py

      - name: Run Madlan scraper (optional, graceful fail)
        run: python scripts/madlan_scraper.py || echo "Madlan scraper failed — skipping"

      - name: Run OnMap scraper (optional, graceful fail)
        run: python scripts/onmap_scraper.py || echo "OnMap scraper failed — skipping"

      - name: Commit updated database
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database.db
          git commit -m "Nightly scrape [$(date +'%Y-%m-%d %H:%M:%S')]" || echo "No changes to commit"
          git push origin main
