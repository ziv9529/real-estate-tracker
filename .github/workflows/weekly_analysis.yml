name: Weekly AI Analysis

permissions:
  contents: write

on:
  # Sunday 07:00 Israel Summer Time = 04:00 UTC
  # Sunday 07:00 Israel Standard Time = 05:00 UTC
  schedule:
    - cron: "0 4 * * 0"

  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly AI analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ai_analysis.py

      - name: Rebuild HTML dashboard (with new AI report)
        run: python scripts/generate_dashboard.py

      - name: Commit updated database and dashboard
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database.db listings.html listings.csv
          git commit -m "Weekly AI analysis [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin main
